# --- Google Hotels Selectors ---
google:
  search_result_item: "a[href*='travel/hotels'], div[data-hveid]"
  hotel_name: "span, h3"
  hotel_url: "a[href*='travel/hotels']"
  hotel_score: "span[aria-label*='star'], span[aria-label*='rating']"
  hotel_review_count: "span[aria-label*='review']"
  hotel_price: "span[aria-label*='price'], span[class*='price']"
