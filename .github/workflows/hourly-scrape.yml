name: Hourly Hotel Scrape

on:
  schedule:
    # Every hour at minute 0 (UTC)
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: hourly-hotel-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Restore scrape database cache
        uses: actions/cache@v5
        with:
          path: |
            data/hotel_scraper.db
            data/cache/scrape_status.json
          key: hotel-scraper-db-${{ github.ref }}
          restore-keys: |
            hotel-scraper-db-

      - name: Initialize database
        run: make db-init

      - name: Run automated scrape (all sources)
        id: automation
        run: make scrape-automation
        env:
          DATABASE_URL: sqlite:///data/hotel_scraper.db
          ENV: production
          LOG_LEVEL: INFO
        continue-on-error: true

      - name: Upload scrape artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scrape-data
          path: |
            data/hotel_scraper.db
            data/cache/scrape_status.json
          if-no-files-found: warn

      - name: Verify automation completed
        if: always()
        run: |
          if [ ! -f data/cache/scrape_status.json ]; then
            echo "Automation cache missing — scrape runner may not have finished."
            exit 1
          fi
          echo "Automation cache present. Scrape step exit: ${{ steps.automation.outcome }}"

      - name: Run tests
        run: pytest tests/ -q --ignore=tests/test_live_scrapers.py
